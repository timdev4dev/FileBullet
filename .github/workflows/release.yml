name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Select latest Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Build FileBullet.app
        run: ./make-app.sh

      - name: Package zip
        run: ditto -c -k --sequesterRsrc --keepParent FileBullet.app FileBullet.zip

      - name: Package dmg
        run: |
          mkdir -p dmg/FileBullet
          cp -R FileBullet.app dmg/FileBullet/
          ln -s /Applications dmg/FileBullet/Applications
          hdiutil create -volname FileBullet -srcfolder dmg/FileBullet \
            -ov -format UDZO FileBullet.dmg

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            FileBullet.dmg
            FileBullet.zip
          generate_release_notes: true
          body: |
            FileBullet — a native SFTP/FTP client for macOS.

            Download `FileBullet.dmg` and drag the app into Applications (or use `FileBullet.zip`).
            The app is ad-hoc signed, so on first launch: right-click → Open.
